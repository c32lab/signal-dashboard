name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, cd]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          cp docker-compose.yml Dockerfile nginx.conf /opt/deploy/${{ github.event.repository.name }}/ 2>/dev/null || true
          cd /opt/deploy/${{ github.event.repository.name }}
          docker compose down --remove-orphans 2>/dev/null || true
          cd $GITHUB_WORKSPACE
          docker compose up --build -d
          echo "✅ ${{ github.event.repository.name }} deployed"

      - name: Health check
        run: |
          sleep 10
          PORT=""
          case "${{ github.event.repository.name }}" in
            signal-dashboard) PORT=3080 ;;
            predict-dashboard) PORT=18828 ;;
            dashboard-portal) PORT=8080 ;;
          esac
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://localhost:$PORT/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
