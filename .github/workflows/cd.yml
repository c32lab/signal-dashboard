name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/c32lab/signal-dashboard:latest,ghcr.io/c32lab/signal-dashboard:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, cd]
    needs: build-and-push
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $(whoami) $GITHUB_WORKSPACE || true

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy
        run: |
          docker compose down --remove-orphans 2>/dev/null || true
          docker compose pull
          docker compose up -d
          echo "✅ signal-dashboard deployed"

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://localhost:8081/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
