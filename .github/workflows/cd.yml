name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  DEPLOY_DIR: /opt/services
  SERVICE_NAME: signal-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/c32lab/signal-dashboard:latest,ghcr.io/c32lab/signal-dashboard:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, cd]
    needs: build-and-push
    steps:
      - name: Sync compose from shared
        run: |
          git -C /opt/shared pull --rebase -q || true
          cp /opt/shared/deploy/docker-compose.yml ${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull and deploy
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose pull ${{ env.SERVICE_NAME }}
          docker compose up -d --no-deps ${{ env.SERVICE_NAME }}
          echo "✅ ${{ env.SERVICE_NAME }} deployed"

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://localhost:8081/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
