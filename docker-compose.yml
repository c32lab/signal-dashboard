services:
  signal-dashboard:
    build: .
    ports:
      - "18800:18800"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18800/"]
      interval: 30s
      timeout: 5s
      retries: 3
